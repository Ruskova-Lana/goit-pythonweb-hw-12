services:
  db:
    image: postgres:13
    container_name: contacts_postgres
    restart: always
    environment:
      POSTGRES_DB: contacts_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: contacts_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data: