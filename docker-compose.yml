services:
  db:
    image: postgres:13
    container_name: contacts_postgres
    restart: always
    environment:
      POSTGRES_DB: contacts_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: contacts_redis
    restart: always
    ports:
      - "6379:6379"

  web:
    build: .
    container_name: contacts_api
    restart: always
    depends_on:
      - db
      - redis
    env_file:
      - .env
    ports:
      - "8000:8000"
    command: poetry run uvicorn goit_hw_12.main:app --host 0.0.0.0 --port 8000

volumes:
  postgres_data: