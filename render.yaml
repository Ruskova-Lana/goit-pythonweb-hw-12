services:
  - type: web
    name: contacts-api
    env: python
    buildCommand: "pip install poetry && poetry config virtualenvs.create false && poetry install --no-root"
    startCommand: "uvicorn goit_hw_12.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: contacts-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: contacts-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.12.0

  - type: psql
    name: contacts-db
    plan: free

  - type: redis
    name: contacts-redis
    plan: free
