name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres123
          POSTGRES_DB: contacts_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
          
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry config virtualenvs.create false
          poetry install --no-root
          
      - name: Create .env file for tests
        run: |
          echo "DATABASE_URL=postgresql+psycopg2://postgres:postgres123@localhost:5432/contacts_db" > .env
          echo "REDIS_URL=redis://localhost:6379/0" >> .env
          echo "SECRET_KEY=testsecretkey12345" >> .env
          echo "ALGORITHM=HS256" >> .env
          echo "CLOUDINARY_NAME=test" >> .env
          echo "CLOUDINARY_API_KEY=test" >> .env
          echo "CLOUDINARY_API_SECRET=test" >> .env

      - name: Run tests with pytest
        run: |
          pytest
          
      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
